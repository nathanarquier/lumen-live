<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="chatShell">

      <!-- SIDEBAR -->
      <aside class="chatSidebar" id="chatSidebar">
        <div class="sidebarInner">

          <div class="sidebarTop">
            <div class="sidebarLogo">Lumen</div>
            <button class="sidebarNewBtn" type="button">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <path d="M7.5 1.5v12M1.5 7.5h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
              New conversation
            </button>
          </div>

          <div class="sidebarConvList">
            <div class="sidebarConvEmpty">
              Your conversations will appear here
            </div>
          </div>

          <div class="sidebarFooter">
            <button class="sidebarAccountBtn" type="button">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.7"/>
                <path d="M2.5 13.5c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
              Account
            </button>
          </div>

        </div>
      </aside>

      <!-- MOBILE SIDEBAR OVERLAY -->
      <div class="sidebarOverlay" id="sidebarOverlay"></div>

      <!-- MAIN PANEL -->
      <main class="chatMain">

        <!-- TOP BAR -->
        <header class="chatTopBar">
          <div class="chatTopLeft">
            <button
              class="hamburgerBtn"
              id="hamburgerBtn"
              type="button"
              aria-label="Open sidebar"
            >
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M3 5.5h14M3 10h14M3 14.5h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="chatTopLogo">Lumen</div>
          </div>

          <nav class="chatViewToggle" role="tablist" aria-label="View">
            <button
              class="chatViewBtn active"
              id="chatViewBtn"
              type="button"
              role="tab"
              aria-selected="true"
            >
              Chat
            </button>
            <button
              class="chatViewBtn locked"
              id="dashViewBtn"
              type="button"
              role="tab"
              aria-selected="false"
              aria-disabled="true"
              title="Sign in to access your dashboard"
            >
              <svg width="11" height="13" viewBox="0 0 11 13" fill="none" aria-hidden="true">
                <rect x="1" y="5.5" width="9" height="6.5" rx="1.6" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3.5 5.5V4a2 2 0 0 1 4 0v1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Dashboard
            </button>
          </nav>
        </header>

        <!-- CHAT VIEW (default) -->
        <div class="chatView" id="chatView" role="tabpanel">

          <div class="chatContent" id="chatContent">
            <div class="chatWelcome">
              <div class="chatWelcomeEyebrow">Lumen</div>
              <h1 class="chatWelcomeTitle">What's on your mind?</h1>
              <p class="chatWelcomeSub">
                Tell me what's going on with your music. I'm here to help you think it through.
              </p>
              <div class="chatPromptsGrid">
                <button class="chatPromptBtn" type="button">
                  Help me figure out what to focus on
                </button>
                <button class="chatPromptBtn" type="button">
                  I want to earn more from my music
                </button>
                <button class="chatPromptBtn" type="button">
                  I have a decision to make
                </button>
                <button class="chatPromptBtn" type="button">
                  Just let me type
                </button>
              </div>
            </div>
          </div>

          <div class="chatInputBar">
            <div class="chatInputWrap">
              <input
                type="text"
                class="chatInputField"
                id="chatInput"
                placeholder="Message Lumen…"
                aria-label="Type a message"
                autocomplete="off"
              />
              <div class="chatInputActions">
                <button
                  class="chatInputAction"
                  type="button"
                  aria-label="Attach image"
                >
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                    <rect x="1.5" y="3.5" width="15" height="11" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
                    <circle cx="6" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M1.5 13 5.5 9.5l3 2.5 2.5-2.5L16 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button
                  class="chatInputAction chatSendBtn"
                  type="button"
                  aria-label="Send message"
                  id="sendBtn"
                >
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M2 8h11M9 4.5 13 8l-4 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

        </div>

        <!-- DASHBOARD VIEW (hidden until auth) -->
        <div class="dashboardView" id="dashboardView" role="tabpanel" aria-hidden="true">
          <div class="dashboardPlaceholder">
            <p>Your dashboard will appear here once you have started a conversation.</p>
          </div>
        </div>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="data.js"></script>
    <script src="supabase.js"></script>
    <script>
      // Shell interactions only — no AI or Supabase wiring yet

      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const chatSidebar  = document.getElementById('chatSidebar');
      const overlay      = document.getElementById('sidebarOverlay');
      const chatViewBtn  = document.getElementById('chatViewBtn');
      const dashViewBtn  = document.getElementById('dashViewBtn');
      const chatView     = document.getElementById('chatView');
      const dashboardView = document.getElementById('dashboardView');

      function openSidebar() {
        chatSidebar.classList.add('open');
        overlay.classList.add('visible');
        hamburgerBtn.setAttribute('aria-label', 'Close sidebar');
      }

      function closeSidebar() {
        chatSidebar.classList.remove('open');
        overlay.classList.remove('visible');
        hamburgerBtn.setAttribute('aria-label', 'Open sidebar');
      }

      hamburgerBtn.addEventListener('click', () => {
        chatSidebar.classList.contains('open') ? closeSidebar() : openSidebar();
      });

      overlay.addEventListener('click', closeSidebar);

      chatViewBtn.addEventListener('click', () => {
        chatViewBtn.classList.add('active');
        chatViewBtn.setAttribute('aria-selected', 'true');
        dashViewBtn.classList.remove('active');
        dashViewBtn.setAttribute('aria-selected', 'false');
        chatView.style.display    = 'flex';
        dashboardView.style.display = 'none';
        dashboardView.setAttribute('aria-hidden', 'true');
      });

      // Dashboard tab locked until authentication is wired
      dashViewBtn.addEventListener('click', (e) => {
        e.preventDefault();
      });
    </script>
  </body>
</html>
